services:

  backend:
    build:
      context: ./backend
    container_name: ticketiq-backend
    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    volumes:
      - sqlite_data:/app/data

  frontend:
    build:
      context: ./frontend

    container_name: ticketiq-frontend

    ports:
      - "3000:3000"

    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

    depends_on:
      - backend

volumes:
  sqlite_data: