services:

  backend:
    build:
      context: ./backend
    container_name: ticketiq-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # SQLite lives inside the named volume — never use a relative path
      DATABASE_URL: sqlite+aiosqlite:////app/data/ticketiq.db
      # Allow browser + frontend container
      CORS_ORIGINS: "http://localhost:3000,http://frontend:3000,http://ticketiq-frontend:3000"
    volumes:
      - sqlite_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        # Browser calls the backend on the HOST — localhost:8000 is correct
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    container_name: ticketiq-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  sqlite_data:
    name: ticketiq_sqlite_data
